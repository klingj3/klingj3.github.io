<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="640" rx="14" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="999" height="639" rx="14" fill="none" stroke="#e2e8f0"/>

  <!-- ===== Board strip ===== -->
  <text x="40" y="40" font-size="15" font-weight="700" fill="#475569">BOARD &#160; (play direction &#8594;)</text>
  <rect x="60" y="56" width="46" height="46" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="83" y="78" font-size="16" text-anchor="middle" fill="#2563eb">&#9733;</text>
  <text x="83" y="94" font-size="10" text-anchor="middle" fill="#2563eb">start</text>
  <rect x="112" y="56" width="46" height="46" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="164" y="56" width="46" height="46" rx="6" fill="#fde68a" stroke="#b45309" stroke-width="2"/>
  <text x="187" y="88" font-size="22" font-weight="700" text-anchor="middle" fill="#7c2d12">T</text>
  <rect x="216" y="56" width="46" height="46" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="83"  y="120" font-size="11" text-anchor="middle" fill="#64748b">pos 0</text>
  <text x="135" y="120" font-size="11" text-anchor="middle" fill="#64748b">pos 1</text>
  <text x="187" y="120" font-size="11" text-anchor="middle" fill="#b45309" font-weight="700">pos 2</text>
  <text x="239" y="120" font-size="11" text-anchor="middle" fill="#64748b">pos 3</text>
  <text x="187" y="135" font-size="10" text-anchor="middle" fill="#b45309">on board</text>

  <!-- ===== Rack ===== -->
  <text x="40" y="178" font-size="15" font-weight="700" fill="#475569">RACK</text>
  <g>
    <rect x="60"  y="190" width="40" height="40" rx="7" fill="#fde68a" stroke="#b45309" stroke-width="1.5"/>
    <text x="80"  y="218" font-size="20" font-weight="700" text-anchor="middle" fill="#7c2d12">Q</text>
    <text x="94"  y="226" font-size="10" text-anchor="middle" fill="#7c2d12">10</text>
    <rect x="104" y="190" width="40" height="40" rx="7" fill="#fde68a" stroke="#b45309" stroke-width="1.5"/>
    <text x="124" y="218" font-size="20" font-weight="700" text-anchor="middle" fill="#7c2d12">A</text>
    <text x="138" y="226" font-size="10" text-anchor="middle" fill="#7c2d12">1</text>
    <rect x="148" y="190" width="40" height="40" rx="7" fill="#fde68a" stroke="#b45309" stroke-width="1.5"/>
    <text x="168" y="218" font-size="20" font-weight="700" text-anchor="middle" fill="#7c2d12">I</text>
    <text x="182" y="226" font-size="10" text-anchor="middle" fill="#7c2d12">1</text>
    <rect x="192" y="190" width="40" height="40" rx="7" fill="#fde68a" stroke="#b45309" stroke-width="1.5"/>
    <text x="212" y="218" font-size="20" font-weight="700" text-anchor="middle" fill="#7c2d12">D</text>
    <text x="226" y="226" font-size="10" text-anchor="middle" fill="#7c2d12">2</text>
  </g>
  <text x="40" y="266" font-size="12" fill="#94a3b8">T is on the board, so it is forced at pos 2,</text>
  <text x="40" y="282" font-size="12" fill="#94a3b8">never drawn from the rack.</text>

  <!-- ===== Forced-column band ===== -->
  <text x="798" y="60" font-size="12" font-weight="700" text-anchor="middle" fill="#b45309">pos 2: forced to T</text>
  <text x="798" y="76" font-size="11" text-anchor="middle" fill="#b45309">only the T child is tried</text>
  <rect x="758" y="90" width="80" height="420" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-dasharray="5 4"/>

  <!-- ===== Edges ===== -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <line x1="400" y1="320" x2="525" y2="210"/>   <!-- root - Q -->
    <line x1="400" y1="320" x2="525" y2="420"/>   <!-- root - A -->
    <line x1="525" y1="210" x2="655" y2="130"/>   <!-- Q - I -->
    <line x1="525" y1="210" x2="655" y2="210"/>   <!-- Q - A -->
    <line x1="525" y1="210" x2="655" y2="290"/>   <!-- Q - D -->
    <line x1="525" y1="420" x2="655" y2="380"/>   <!-- A - I -->
    <line x1="525" y1="420" x2="655" y2="460"/>   <!-- A - D -->
  </g>
  <!-- faded "other first letters" edge -->
  <line x1="400" y1="320" x2="525" y2="545" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5 4"/>
  <!-- forced edges (board tile) -->
  <g stroke="#d97706" stroke-width="3" fill="none">
    <line x1="655" y1="130" x2="798" y2="130"/>   <!-- I - T (QIT) -->
    <line x1="655" y1="210" x2="798" y2="210"/>   <!-- A - T (QAT) -->
    <line x1="655" y1="380" x2="798" y2="380"/>   <!-- I - T (AIT) -->
    <line x1="655" y1="460" x2="798" y2="460"/>   <!-- D - T (ADT) -->
  </g>

  <!-- ===== Nodes ===== -->
  <!-- root -->
  <circle cx="400" cy="320" r="22" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="400" y="327" font-size="20" text-anchor="middle" fill="#64748b">&#8226;</text>

  <!-- pos 0 -->
  <circle cx="525" cy="210" r="22" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="525" y="217" font-size="18" font-weight="700" text-anchor="middle" fill="#334155">Q</text>
  <circle cx="525" cy="420" r="22" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="525" y="427" font-size="18" font-weight="700" text-anchor="middle" fill="#334155">A</text>
  <circle cx="525" cy="545" r="18" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="525" y="551" font-size="18" text-anchor="middle" fill="#cbd5e1">&#8230;</text>
  <text x="555" y="550" font-size="12" fill="#94a3b8">I, D, &#8230; also tried as the opening tile</text>

  <!-- pos 1 under Q -->
  <circle cx="655" cy="130" r="22" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="655" y="137" font-size="18" font-weight="700" text-anchor="middle" fill="#334155">I</text>
  <circle cx="655" cy="210" r="22" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="655" y="217" font-size="18" font-weight="700" text-anchor="middle" fill="#334155">A</text>
  <circle cx="655" cy="290" r="22" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="655" y="297" font-size="18" font-weight="700" text-anchor="middle" fill="#94a3b8">D</text>
  <text x="655" y="326" font-size="11" text-anchor="middle" fill="#94a3b8">QD: no such prefix</text>

  <!-- pos 1 under A -->
  <circle cx="655" cy="380" r="22" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="655" y="387" font-size="18" font-weight="700" text-anchor="middle" fill="#334155">I</text>
  <circle cx="655" cy="460" r="22" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="655" y="467" font-size="18" font-weight="700" text-anchor="middle" fill="#334155">D</text>

  <!-- pos 2 (forced T) -->
  <circle cx="798" cy="130" r="22" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="798" y="137" font-size="18" font-weight="700" text-anchor="middle" fill="#94a3b8">T</text>
  <text x="850" y="135" font-size="14" font-weight="700" fill="#94a3b8">QIT &#10007;</text>

  <circle cx="798" cy="210" r="22" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="798" y="217" font-size="18" font-weight="700" text-anchor="middle" fill="#15803d">T</text>
  <text x="850" y="215" font-size="14" font-weight="700" fill="#15803d">QAT &#10003;</text>

  <circle cx="798" cy="380" r="22" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="798" y="387" font-size="18" font-weight="700" text-anchor="middle" fill="#15803d">T</text>
  <text x="850" y="385" font-size="14" font-weight="700" fill="#15803d">AIT &#10003;</text>

  <circle cx="798" cy="460" r="22" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="798" y="467" font-size="18" font-weight="700" text-anchor="middle" fill="#94a3b8">T</text>
  <text x="850" y="465" font-size="14" font-weight="700" fill="#94a3b8">ADT &#10007;</text>

  <!-- ===== Legend ===== -->
  <g font-size="13" fill="#475569">
    <circle cx="70" cy="605" r="11" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="88" y="610">prefix node</text>

    <circle cx="215" cy="605" r="11" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
    <text x="233" y="610">valid word</text>

    <circle cx="350" cy="605" r="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="368" y="610">pruned branch</text>

    <line x1="510" y1="605" x2="542" y2="605" stroke="#d97706" stroke-width="3"/>
    <text x="550" y="610">letter forced by a board tile</text>
  </g>
</svg>
